name: CI/CD DevSecOps GitOps Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write

env:
  BACKEND_IMAGE: picoyplaca-backend
  FRONTEND_IMAGE: picoyplaca-frontend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-test:
    name: Build, Tests and Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Test backend
        run: |
          cd picoyplaca
          chmod +x mvnw
          ./mvnw clean test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: pico-placa-frontend/package-lock.json

      - name: Build frontend
        run: |
          cd pico-placa-frontend
          npm ci
          npm run build

      - name: Audit frontend dependencies
        run: |
          cd pico-placa-frontend
          npm audit --audit-level=high

  security-sast:
    name: SAST, Secrets and Kubernetes Policy Scan
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan repository with Trivy
        run: |
          trivy fs \
            --scanners vuln,secret,config \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format table \
            --exit-code 0 \
            .

      - name: Render GitOps manifests
        run: kubectl kustomize gitops/overlays/dev > rendered-manifests.yaml

      - name: Scan rendered Kubernetes manifests
        run: |
          trivy config \
            --severity CRITICAL,HIGH \
            --format table \
            --exit-code 0 \
            rendered-manifests.yaml

  package-sign-and-push:
    name: Build, Push, SBOM and Sign Images
    needs: security-sast
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./picoyplaca
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest
          sbom: true
          provenance: true

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./pico-placa-frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
          sbom: true
          provenance: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign backend image
        run: cosign sign --yes ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Sign frontend image
        run: cosign sign --yes ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}

  update-gitops:
    name: Update GitOps Desired State
    needs: package-sign-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tags in Kustomize overlay
        run: |
          cd gitops/overlays/dev
          kustomize edit set image mauro101/picoyplaca-backend=${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          kustomize edit set image mauro101/picoyplaca-frontend=${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Commit GitOps image tag update
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore(gitops): deploy image ${{ env.IMAGE_TAG }} [skip ci]"
          file_pattern: gitops/overlays/dev/kustomization.yaml

  deploy-and-dast:
    name: Argo CD Deploy and DAST
    needs: update-gitops
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: picoyplaca-devsecops

      - name: Install Argo CD
        run: |
          kubectl create namespace argocd
          kubectl apply -n argocd --server-side --force-conflicts -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
          kubectl -n argocd rollout status deployment/argocd-repo-server --timeout=180s
          kubectl -n argocd rollout status statefulset/argocd-application-controller --timeout=180s

      - name: Configure Docker Hub pull secret
        run: |
          kubectl create namespace picoyplaca --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n picoyplaca create secret docker-registry dockerhub-registry \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username='${{ secrets.DOCKER_USERNAME }}' \
            --docker-password='${{ secrets.DOCKER_PASSWORD }}' \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n picoyplaca patch serviceaccount default \
            -p '{"imagePullSecrets":[{"name":"dockerhub-registry"}]}'

      - name: Register PicoyPlaca application in Argo CD
        run: |
          kubectl apply -f gitops/argocd/application.yaml
          for i in {1..60}; do
            kubectl get namespace picoyplaca >/dev/null 2>&1 && break
            sleep 5
          done
          for i in {1..60}; do
            SYNC_STATUS="$(kubectl -n argocd get application picoyplaca-dev -o jsonpath='{.status.sync.status}' 2>/dev/null || true)"
            HEALTH_STATUS="$(kubectl -n argocd get application picoyplaca-dev -o jsonpath='{.status.health.status}' 2>/dev/null || true)"
            echo "Argo CD status: sync=${SYNC_STATUS:-unknown}, health=${HEALTH_STATUS:-unknown}"
            if [ "$SYNC_STATUS" = "Synced" ] && [ "$HEALTH_STATUS" = "Healthy" ]; then
              break
            fi
            kubectl -n argocd get application picoyplaca-dev -o jsonpath='{.status.conditions}' || true
            sleep 10
          done
          test "$(kubectl -n argocd get application picoyplaca-dev -o jsonpath='{.status.sync.status}')" = "Synced"
          test "$(kubectl -n argocd get application picoyplaca-dev -o jsonpath='{.status.health.status}')" = "Healthy"
          kubectl -n picoyplaca rollout status deployment/picoyplaca-backend --timeout=240s
          kubectl -n picoyplaca rollout status deployment/picoyplaca-frontend --timeout=240s
          kubectl -n argocd get application picoyplaca-dev -o wide

      - name: Port forward frontend for DAST
        run: |
          kubectl -n picoyplaca port-forward svc/picoyplaca-frontend-service 30080:80 &
          sleep 10

      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:30080
          fail_action: true
