name: CI/CD DevSecOps Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  # 1. ETAPA DE BUILD Y PRUEBAS
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Compilar y Probar el Backend (Spring Boot)
      run: |
        cd picoyplaca
        chmod +x mvnw
        ./mvnw clean test

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Instalar Dependencias del Frontend (Angular)
      run: |
        cd pico-placa-frontend
        npm install

  # 2. INTEGRACIÓN DEVSECOPS: ANÁLISIS SAST (Herramienta 1 de Seguridad)
  security-sast:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Instalar Trivy de forma nativa
      run: |
        sudo apt-get update && sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update && sudo apt-get install -y trivy

    - name: Ejecutar escaneo estático sin dependencias externas
      run: |
        trivy fs --scanners misconfig,secret --skip-files picoyplaca/pom.xml --format table --output sast-report.txt .
        cat sast-report.txt

  # 3. GENERACIÓN DE ARTEFACTOS Y PUSH A DOCKER HUB
  package-and-push:
    needs: security-sast
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Autenticación en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Construir y Subir Imagen Docker - Backend
      uses: docker/build-push-action@v5
      with:
        context: ./picoyplaca
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/picoyplaca-backend:latest

    - name: Construir y Subir Imagen Docker - Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./pico-placa-frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/picoyplaca-frontend:latest

  # 4 y 5. GITOPS (ARGO CD) Y ANÁLISIS DAST
  deploy-and-dast:
    needs: package-and-push
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: read

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Clúster Kubernetes Local
      uses: engineerd/setup-kind@v0.5.0
      with:
        version: "v0.11.1"

    - name: Instalar Argo CD
      run: |
        kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -

        kubectl apply -n argocd \
          -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

        echo "Esperando Deployment de Argo CD..."

        kubectl rollout status deployment/argocd-server -n argocd --timeout=600s
        kubectl rollout status deployment/argocd-repo-server -n argocd --timeout=600s
        kubectl rollout status deployment/argocd-application-controller -n argocd --timeout=600s

        kubectl wait \
          --for=condition=Ready \
          pod \
          --all \
          -n argocd \
          --timeout=600s

    - name: Instalar CLI de Argo CD
      run: |
        curl -sSL -o argocd \
        https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64

        chmod +x argocd
        sudo mv argocd /usr/local/bin/

    - name: Exponer servidor Argo CD
      run: |
        kubectl port-forward svc/argocd-server \
          -n argocd \
          8080:443 > /tmp/argocd.log 2>&1 &

        sleep 20

    - name: Login en Argo CD
      run: |
        PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret \
          -o jsonpath="{.data.password}" | base64 -d)

        argocd login localhost:8080 \
          --username admin \
          --password "$PASSWORD" \
          --insecure

    - name: Actualizar imágenes Kubernetes
      run: |
        sed -i "s|tu-usuario-docker|${{ secrets.DOCKER_USERNAME }}|g" k8s/backend-k8s.yaml
        sed -i "s|tu-usuario-docker|${{ secrets.DOCKER_USERNAME }}|g" k8s/frontend-k8s.yaml

    - name: Crear Application GitOps
      run: |
        cat <<EOF | kubectl apply -f -
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: picoyplaca-app
          namespace: argocd
        spec:
          project: default

          source:
            repoURL: https://github.com/${{ github.repository }}.git
            targetRevision: main
            path: k8s

          destination:
            server: https://kubernetes.default.svc
            namespace: default

          syncPolicy:
            automated:
              prune: true
              selfHeal: true

            syncOptions:
            - CreateNamespace=true
        EOF

    - name: Sincronizar aplicación
      run: |
        argocd app sync picoyplaca-app

    - name: Esperar despliegue
      run: |
        argocd app wait picoyplaca-app \
          --health \
          --sync \
          --timeout 600

    - name: Verificar recursos
      run: |
        kubectl get all
        kubectl get pods -A
        kubectl get applications -n argocd

    - name: Esperar Deployments
      run: |
        kubectl rollout status deployment/picoyplaca-backend --timeout=300s
        kubectl rollout status deployment/picoyplaca-frontend --timeout=300s

    - name: Preparar entorno para DAST
      run: |
        kubectl port-forward \
          svc/picoyplaca-frontend-service \
          30080:80 &

        sleep 15

        chmod -R 777 .

    - name: Escaneo Dinámico DAST con OWASP ZAP
      uses: zaproxy/action-baseline@v0.15.0
      with:
        target: http://localhost:30080
        fail_action: false
