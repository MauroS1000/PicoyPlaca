name: CI/CD DevSecOps Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  # Unificamos Build, Test y SAST en un solo entorno para reutilizar la caché local
  build-test-and-sast:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Java 17 con Caché Automática de Maven
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven' # Esto guarda automáticamente las dependencias en caché de GitHub

    - name: Compilar y Descargar Dependencias del Backend (Spring Boot)
      run: |
        cd picoyplaca
        chmod +x mvnw
        ./mvnw clean test dependency:resolve # Descarga todo localmente para que Trivy no falle

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Instalar Dependencias del Frontend (Angular)
      run: |
        cd pico-placa-frontend
        npm install

    # INTEGRACIÓN DEVSECOPS: ANÁLISIS SAST (Herramienta 1 de Seguridad)
    # Al estar en el mismo runner, Trivy usará la carpeta ~/.m2 local y evitará el error 429
    <br>
    - name: Escaneo de Vulnerabilidades SAST con Trivy
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        ignore-unfixed: true
        format: 'table'
        output: 'sast-report.txt'
        severity: 'HIGH,CRITICAL'

  # GENERACIÓN DE ARTEFACTOS Y PUSH A DOCKER HUB
  package-and-push:
    needs: build-test-and-sast
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Autenticación en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Construir y Subir Imagen Docker - Backend
      uses: docker/build-push-action@v5
      with:
        context: ./picoyplaca
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/picoyplaca-backend:latest

    - name: Construir y Subir Imagen Docker - Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./pico-placa-frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/picoyplaca-frontend:latest

  # DESPLIEGUE CONTINUO EN KUBERNETES
  deploy-to-k8s:
    needs: package-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Clúster Kubernetes Local
      uses: engineerd/setup-kind@v0.5.0
      with:
        version: "v0.11.1"

    - name: Desplegar Manifiestos en Kubernetes
      run: |
        kubectl apply -f k8s/backend-k8s.yaml
        kubectl apply -f k8s/frontend-k8s.yaml
        kubectl get pods

  # INTEGRACIÓN DEVSECOPS: ANÁLISIS DAST (Herramienta 2 de Seguridad)
  security-dast:
    needs: deploy-to-k8s
    runs-on: ubuntu-latest
    steps:
    - name: Escaneo Dinámico DAST con OWASP ZAP (Baseline Scan)
      uses: zaproxy/action-baseline@v0.12.0
      with:
        target: 'http://localhost:30080'
        rules_file_name: '.zap/rules.tsv'
        fail_action: false
