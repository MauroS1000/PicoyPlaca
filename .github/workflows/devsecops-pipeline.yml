name: CI/CD DevSecOps Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  # 1. ETAPA DE BUILD Y PRUEBAS
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Compilar y Probar el Backend (Spring Boot)
      run: |
        cd picoyplaca
        chmod +x mvnw
        ./mvnw clean test

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Instalar Dependencias del Frontend (Angular)
      run: |
        cd pico-placa-frontend
        npm install

  # 2. INTEGRACIÓN DEVSECOPS: ANÁLISIS SAST (Herramienta 1 de Seguridad)
  security-sast:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Instalar Trivy de forma nativa
      run: |
        sudo apt-get update && sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update && sudo apt-get install -y trivy

    - name: Ejecutar escaneo estático sin dependencias externas
      run: |
        trivy fs --scanners misconfig,secret --skip-files picoyplaca/pom.xml --format table --output sast-report.txt .
        cat sast-report.txt

  # 3. GENERACIÓN DE ARTEFACTOS Y PUSH A DOCKER HUB
  package-and-push:
    needs: security-sast
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Autenticación en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Construir y Subir Imagen Docker - Backend
      uses: docker/build-push-action@v5
      with:
        context: ./picoyplaca
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/picoyplaca-backend:latest

    - name: Construir y Subir Imagen Docker - Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./pico-placa-frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/picoyplaca-frontend:latest

  # 4 y 5. GITOPS (ARGO CD) Y ANÁLISIS DAST
  deploy-and-dast:
    needs: package-and-push
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Clúster Kubernetes Local
      uses: engineerd/setup-kind@v0.5.0
      with:
        version: "v0.11.1"

    - name: Instalar Argo CD en el Clúster
      run: |
        kubectl create namespace argocd
        kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
        
        echo "Esperando inicialización de los servicios de Argo CD..."
        kubectl wait --for=condition=Ready pods --all -n argocd --timeout=300s
    - name: Desplegar la aplicación mediante GitOps (Argo CD)
      run: |
        # Inyectamos el CRD (Custom Resource Definition) para que ArgoCD jale el código
        cat <<EOF | kubectl apply -f -
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: picoyplaca-app
          namespace: argocd
        spec:
          project: default
          source:
            repoURL: 'https://github.com/${{ github.repository }}.git'
            path: k8s
            targetRevision: ${{ github.sha }}
          destination:
            server: 'https://kubernetes.default.svc'
            namespace: default
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
        EOF
        
        echo "Esperando a que Argo CD sincronice los contenedores..."
        sleep 20
        kubectl rollout status deployment/picoyplaca-backend --timeout=120s
        kubectl rollout status deployment/picoyplaca-frontend --timeout=120s

    - name: Preparar entorno para DAST
      run: |
        echo "Habilitando port-forwarding para el escáner DAST..."
        kubectl port-forward svc/picoyplaca-frontend-service 30080:80 &
        sleep 10
        
        echo "Ajustando permisos para el reporte de ZAP..."
        chmod 777 . 

    - name: Escaneo Dinámico DAST con OWASP ZAP (Baseline Scan)
      uses: zaproxy/action-baseline@v0.15.0
      with:
        target: 'http://localhost:30080'
        fail_action: false
