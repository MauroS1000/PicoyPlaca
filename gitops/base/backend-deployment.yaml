apiVersion: apps/v1
kind: Deployment
metadata:
  name: picoyplaca-backend
  labels:
    app.kubernetes.io/name: picoyplaca-backend
    app.kubernetes.io/part-of: picoyplaca
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: picoyplaca-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: picoyplaca-backend
        app.kubernetes.io/part-of: picoyplaca
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: mauro101/picoyplaca-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: CORS_ALLOWED_ORIGINS
              value: "http://localhost:30080"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
